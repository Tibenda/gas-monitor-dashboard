<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Gas Monitoring Dashboard</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* Animated Background */

body::before{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(0,255,255,0.08);
    border-radius:50%;
    top:-250px;
    left:-200px;
    filter:blur(80px);
    animation:float 8s ease-in-out infinite alternate;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:rgba(255,0,100,0.08);
    border-radius:50%;
    bottom:-250px;
    right:-150px;
    filter:blur(80px);
    animation:float2 10s ease-in-out infinite alternate;
}

@keyframes float{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(40px);
    }
}

@keyframes float2{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-40px);
    }
}

/* Container */

.container{
    position:relative;
    z-index:2;
    padding:30px;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.logo{
    font-size:30px;
    font-weight:700;
    color:#38bdf8;
}

.time{
    background:rgba(255,255,255,0.08);
    padding:12px 18px;
    border-radius:14px;
    backdrop-filter:blur(10px);
    font-size:14px;
}

/* Dashboard Grid */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

/* Card */

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:24px;
    padding:25px;
    transition:0.4s;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.card:hover{
    transform:translateY(-5px);
}

/* Titles */

.card-title{
    font-size:18px;
    color:#cbd5e1;
    margin-bottom:20px;
}

/* Sensor Value */

.sensor-value{
    font-size:64px;
    font-weight:700;
    color:#38bdf8;
    text-align:center;
}

.ppm{
    text-align:center;
    margin-top:8px;
    color:#94a3b8;
}

/* Status */

.status-box{
    text-align:center;
    padding:20px;
    border-radius:18px;
    font-size:24px;
    font-weight:700;
    transition:0.4s;
}

.normal{
    background:rgba(34,197,94,0.15);
    color:#22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.3);
}

.danger{
    background:rgba(239,68,68,0.15);
    color:#ef4444;
    box-shadow:0 0 30px rgba(239,68,68,0.5);
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.03);
    }
    100%{
        transform:scale(1);
    }
}

/* Toggle Switch */

.switch-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0;
}

.switch-label{
    font-size:18px;
}

.switch{
    position:relative;
    width:70px;
    height:36px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#334155;
    border-radius:50px;
    transition:0.4s;
}

.slider::before{
    content:'';
    position:absolute;
    width:28px;
    height:28px;
    left:4px;
    bottom:4px;
    background:white;
    border-radius:50%;
    transition:0.4s;
}

input:checked + .slider{
    background:#22c55e;
}

input:checked + .slider::before{
    transform:translateX(34px);
}

/* Buttons */

.btn{
    width:100%;
    border:none;
    padding:15px;
    border-radius:16px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.btn-on{
    background:#22c55e;
    color:white;
}

.btn-off{
    background:#ef4444;
    color:white;
}

.btn:hover{
    transform:scale(1.02);
}

/* LED Indicators */

.indicators{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.indicator{
    text-align:center;
}

.light{
    width:30px;
    height:30px;
    border-radius:50%;
    margin:auto;
    margin-bottom:10px;
}

.white-light{
    background:white;
    box-shadow:0 0 20px white;
}

.red-light{
    background:red;
    box-shadow:0 0 20px red;
}

.off-light{
    background:#444;
    box-shadow:none;
}

/* Progress */

.progress-container{
    margin-top:20px;
}

.progress-bar{
    width:100%;
    height:18px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    border-radius:20px;
    transition:0.5s;
    background:linear-gradient(90deg,#38bdf8,#22c55e,#ef4444);
}

/* Footer */

.footer{
    text-align:center;
    margin-top:40px;
    color:#94a3b8;
}

/* Responsive */

@media(max-width:768px){

    .sensor-value{
        font-size:48px;
    }

    .header{
        gap:15px;
    }

}


/* =========================
   LIGHT MODE
========================= */

body.light-mode{
    background:#f1f5f9;
    color:#0f172a;
}

body.light-mode .card{
    background:rgba(255,255,255,0.8);
    border:1px solid rgba(0,0,0,0.08);
    color:#0f172a;
}

body.light-mode .card-title{
    color:#334155;
}

body.light-mode .ppm{
    color:#475569;
}

body.light-mode .time{
    background:rgba(0,0,0,0.08);
    color:#0f172a;
}

body.light-mode .footer{
    color:#334155;
}

body.light-mode .progress-bar{
    background:#cbd5e1;
}

/* =========================
   THEME BUTTON
========================= */

.theme-btn{
    border:none;
    padding:12px 18px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    background:#38bdf8;
    color:white;
    transition:0.3s;
}

.theme-btn:hover{
    transform:scale(1.05);
}

.premium-footer{
    margin-top:40px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    color:#94a3b8;
    font-size:14px;
    letter-spacing:1px;
    animation:glow 3s infinite alternate;
}

@keyframes glow{

    from{
        box-shadow:0 0 10px rgba(56,189,248,0.2);
    }

    to{
        box-shadow:0 0 20px rgba(56,189,248,0.5);
    }

}
</style>
</head>

<body>

<div class="container">

    <!-- Header -->
<div class="header">

    <div class="logo">
        SMART GAS DETECTOR 
    </div>

    <div style="display:flex; gap:15px; align-items:center;">

        <button id="themeToggle" class="theme-btn">
            🌙 Dark
        </button>

        <div class="time" id="time">
            Loading Time...
        </div>

    </div>

</div>

    <!-- Grid -->

    <div class="grid">

        <!-- Sensor Reading -->

        <div class="card">

            <div class="card-title">
                MQ-9 Gas Sensor Reading
            </div>

            <div class="sensor-value" id="gasValue">
                0
            </div>

            <div class="ppm">
                PPM Level
            </div>

            <div class="progress-container">

                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>

            </div>

        </div>
        

        <!-- Status -->

        <div class="card">

            <div class="card-title">
                Detection Status
            </div>

            <div class="status-box normal" id="statusBox">
                NORMAL
            </div>

            <div class="indicators">

                <div class="indicator">
                    <div class="light white-light" id="whiteLed"></div>
                    White LED
                </div>

                <div class="indicator">
                    <div class="light off-light" id="redLed"></div>
                    Red LED
                </div>

            </div>

        </div>

        <!-- Controls -->

        <div class="card">

            <div class="card-title">
                Manual Controls
            </div>

            <div class="switch-container">

                <div class="switch-label">
                    System Power
                </div>

                <label class="switch">
                    <input type="checkbox" id="systemSwitch" checked>
                    <span class="slider"></span>
                </label>

            </div>

            <button class="btn btn-on" onclick="manualON()">
                TURN ON ALARM
            </button>

            <button class="btn btn-off" onclick="manualOFF()">
                TURN OFF ALARM
            </button>

        </div>

    </div>

    <div class="footer">
        Real-Time IoT Gas Monitoring Dashboard
    
    </div>

</div>

<script>

/* =========================================
   FIREBASE CONFIG
========================================= */

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",

    authDomain: "YOUR_PROJECT.firebaseapp.com",

    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

    projectId: "YOUR_PROJECT",

    storageBucket: "YOUR_PROJECT.appspot.com",

    messagingSenderId: "XXXX",

    appId: "XXXX"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* =========================================
   CLOCK
========================================= */

function updateClock(){

    const now = new Date();

    document.getElementById('time').innerHTML =
        now.toLocaleDateString() + " | " +
        now.toLocaleTimeString();

}

setInterval(updateClock,1000);
updateClock();

/* =========================================
   REALTIME SENSOR DATA
========================================= */

db.ref("sensor").on("value",(snapshot)=>{

    const data = snapshot.val();

    if(!data) return;

    let gasValue = data.gasValue || 0;

    let gasDetected = data.gasDetected || false;

    document.getElementById("gasValue").innerHTML = gasValue;

    /* Progress Bar */

    let percent = Math.min((gasValue / 1000) * 100,100);

    document.getElementById("progress").style.width = percent + "%";

    /* Status */

    const statusBox = document.getElementById("statusBox");

    const whiteLed = document.getElementById("whiteLed");

    const redLed = document.getElementById("redLed");

    if(gasDetected){

        statusBox.innerHTML = "GAS DETECTED";

        statusBox.classList.remove("normal");

        statusBox.classList.add("danger");

        whiteLed.className = "light off-light";

        redLed.className = "light red-light";

    }else{

        statusBox.innerHTML = "NORMAL";

        statusBox.classList.remove("danger");

        statusBox.classList.add("normal");

        whiteLed.className = "light white-light";

        redLed.className = "light off-light";
    }

});

/* =========================================
   MANUAL CONTROLS
========================================= */

function manualON(){

    db.ref("controls").set({

        alarm:true

    });

}

function manualOFF(){

    db.ref("controls").set({

        alarm:false

    });

}

/* =========================================
   SYSTEM POWER SWITCH
========================================= */

document.getElementById("systemSwitch")
.addEventListener("change",function(){

    db.ref("controls").update({

        system:this.checked

    });

});


/* =========================================
   DARK / LIGHT MODE
========================================= */

const themeToggle = document.getElementById("themeToggle");

/* Load Saved Theme */

if(localStorage.getItem("theme") === "light"){

    document.body.classList.add("light-mode");

    themeToggle.innerHTML = "☀️ Light";

}

/* Toggle Theme */

themeToggle.addEventListener("click",()=>{

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){

        localStorage.setItem("theme","light");

        themeToggle.innerHTML = "☀️ Light";

    }else{

        localStorage.setItem("theme","dark");

        themeToggle.innerHTML = "🌙 Dark";
    }

});

</script>
<div class="footer premium-footer">
    © 2026 Smart Gas Monitoring System | Developed by ELYSE TUYIRINGIRE
</div>
</body>
</html>
